name: Check Links

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --exclude '^mailto:'
            --exclude 'play\.google\.com'
            --exclude 'polyfill\.io'
            '**/*.md'
          fail: true
